[template]
cargo_generate_version = ">=0.18.0"

# Exclude binary/build files from template substitution
exclude = [
    "target/",
    "www/node_modules/",
    "www/dist/",
    "*.wasm",
    "Cargo.lock",
    "state.json",
    "docks-layout.json",
    "*.png",
    "*.jpg",
    "*.jpeg",
    "*.ico",
    "*.woff",
    "*.woff2",
    "*.ttf",
    "*.eot",
    "bun.lock",
    "package-lock.json",
]

[placeholders]
project-description = { type = "string", prompt = "Project description", default = "A GPUI desktop application" }
author-name = { type = "string", prompt = "Author name", default = "" }
author-email = { type = "string", prompt = "Author email", default = "" }

# cargo-generate auto-initializes git repo by default, no hooks needed
